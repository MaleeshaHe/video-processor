services:
  video-processor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: video-processor

    ports:
      - "${PORT:-3000}:3000"

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000

      TEMP_DIRECTORY: temp
      UPLOAD_DIRECTORY: temp/uploads
      OUTPUT_DIRECTORY: temp/outputs

      BACKGROUND_MUSIC_PATH: assets/background.mp3

      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-524288000}

      BACKGROUND_VOLUME: ${BACKGROUND_VOLUME:-0.5}
      ORIGINAL_AUDIO_VOLUME: ${ORIGINAL_AUDIO_VOLUME:-1.0}

      LOG_LEVEL: ${LOG_LEVEL:-info}

    volumes:
      - ./assets:/app/assets:ro
      - ./logs:/app/logs
      - video_temp:/app/temp

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

    networks:
      - default
      - caddy

volumes:
  video_temp:
    driver: local

networks:
  caddy:
    external: true
    name: n8n-docker-caddy_default